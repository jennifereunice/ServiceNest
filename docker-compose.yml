services:

  postgres:
    image: postgres:15
    container_name: servicenest-db
    environment:
      POSTGRES_DB: servicenest
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: jennifer123
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: servicenest-backend
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/servicenest
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: jennifer123

  frontend:
    build:
      context: ./frontend/servicenest-frontend
    container_name: servicenest-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres-data:
